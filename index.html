<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
    <title>kirbStore only works with Polygol.</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Material+Symbols+Rounded:opsz,wght,FILL,GRAD@24,700,1,0" />
    <script src="/assets/gurapp/api/gurasuraisu-api.js" defer></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Inter', sans-serif;
            -webkit-tap-highlight-color: transparent;
            font-variant-numeric: tabular-nums;
        }

        body {
            background-color: var(--background-color-tr);
            min-height: 100vh;
            padding: 20px;
            padding-top: 80px;
            display: flex;
            flex-direction: column;
            gap: 20px;
            color: var(--text-color);
            transition: background-color 0.3s, color 0.3s;
            user-select: none;
            justify-content: start;
            align-items: center;
        }
        
        .content {
            width: 100%;
            max-width: 1200px;
        }

        .app-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
            gap: 20px;
        }

        .app-card {
            background-color: var(--search-background);
            border: 1px solid var(--glass-border);
            border-radius: 50px;
            corner-shape: superellipse(1.5);
            padding: 10px;
            transition: all 0.3s ease;
            display: flex;
            flex-direction: column;
            gap: 12px;
            backdrop-filter: var(--edge-refraction-filter) saturate(2) blur(2.5px);
            box-shadow: var(--sun-shadow);
            cursor: pointer;
        }

        .app-header {
            display: flex;
            align-items: center;
            gap: 15px;
            margin-left: 4px;
        }

        .app-icon {
            width: 60px;
            height: 60px;
            border-radius: 35%;
            corner-shape: superellipse(1.25);
            flex-shrink: 0;
        }

        .app-info {
            flex-grow: 1;
            display: flex;
            flex-direction: column;
            gap: 4px;
        }

        .app-name {
            font-weight: 600;
            color: var(--text-color);
            font-size: 16px;
            font-family: 'Open Runde';
        }

        .app-developer {
            color: var(--secondary-text-color);
            font-size: 14px;
        }

        .app-rating {
            color: var(--text-color);
            font-size: 14px;
            display: flex;
            align-items: center;
            gap: 4px;
        }

        .install-btn {
            width: 100%;
            background-color: var(--accent);
            color: var(--background-color);
            border: 1px solid var(--glass-border);
            border-radius: 25px;
            padding: 10px 15px;
            cursor: pointer;
            transition: all 0.3s ease;
            font-weight: 500;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 6px;
            transform: scale(1);
            box-shadow: var(--sun-shadow);
        }

        .install-btn .material-symbols-rounded {
            color: var(--background-color);
            font-size: 18px;
        }
        
        .install-btn:active:not(:disabled) {
            transform: scale(0.98);
        }

        .install-btn:disabled {
            background-color: var(--search-background);
            color: var(--secondary-text-color);
            border-color: var(--glass-border);
            cursor: not-allowed;
            transform: scale(1);
        }

        .update-btn {
            flex-grow: 1;
            background-color: transparent;
            border: 1px solid var(--glass-border);
            border-radius: 25px;
            padding: 10px 15px;
            cursor: pointer;
            transition: all 0.3s ease;
            font-weight: 500;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 6px;
            transform: scale(1);
            box-shadow: var(--sun-shadow);
        }
        
        .update-btn .material-symbols-rounded {
            font-size: 18px;
        }
        
        .uninstall-btn {
            flex-grow: 1;
            width: 100%;
            background-color: transparent;
            color: var(--secondary-text-color);
            border: 1px solid var(--glass-border);
            border-radius: 25px;
            padding: 10px 15px;
            cursor: pointer;
            transition: all 0.3s ease;
            font-weight: 500;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            transform: scale(1);
            box-shadow: var(--sun-shadow);
        }

        .uninstall-btn .material-symbols-rounded {
            color: var(--secondary-text-color);
            font-size: 18px;
        }

        .uninstall-btn:active:not(:disabled) {
            transform: scale(0.98);
        }

        .material-symbols-rounded {
            font-size: 24px;
            color: var(--text-color);
        }

        .loading-message, .no-apps-message {
            text-align: center;
            color: var(--secondary-text-color);
            font-size: 16px;
            padding: 40px;
            grid-column: 1 / -1;
        }

        .create-modal {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background-color: var(--overlay-color);
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 1000;
            visibility: hidden;
            opacity: 0;
            transition: all 0.3s cubic-bezier(.3, 1.2, .64, 1);
            transform: scale(0.9);
            filter: blur(5px);
        }
        
        .create-modal.show {
            visibility: visible;
            opacity: 1;
            transition-delay: 0s;
            transform: none;
            filter: none;
            border-radius: 0;
        }

        .modal-content {
            background-color: var(--search-background);
            border-radius: 50px;
            corner-shape: superellipse(1.5);
            padding: 25px;
            width: 90%;
            max-width: 500px;
            border: 1px solid var(--glass-border);
            backdrop-filter: var(--edge-refraction-filter) saturate(2) blur(5px);
            box-shadow: var(--sun-shadow), 0 0 50px rgba(0, 0, 0, 0.2);
        }

        .modal-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 25px;
            padding: 0 8px;
        }

        .modal-title {
            font-size: 1.3rem;
            font-weight: 600;
        }

        .close-modal {
            background: none;
            border: none;
            color: var(--text-color);
            font-size: 1.5rem;
            cursor: pointer;
        }

        .form-group {
            margin-bottom: 20px;
        }

        .form-label {
            display: block;
            font-size: 0.9rem;
            color: var(--secondary-text-color);
            margin-bottom: 8px;
        }

        .form-input, .form-textarea {
            width: 100%;
            padding: 12px 16px;
            border-radius: 25px;
            corner-shape: superellipse(1.5);
            border: 1px solid var(--glass-border);
            background-color: var(--search-background);
            color: var(--text-color);
            box-shadow: var(--sun-shadow);
            font-size: 1rem;
            outline: none;
        }

        .form-textarea {
            min-height: 80px;
            resize: vertical;
        }

        .form-row {
            display: flex;
            gap: 15px;
        }

        .form-row .form-group {
            flex: 1;
        }

        .submit-btn {
            background-color: var(--accent);
            color: var(--background-color);
            border: 1px solid var(--glass-border);
            border-radius: 25px;
            padding: 12px;
            cursor: pointer;
            font-weight: 500;
            margin-top: 10px;
            box-shadow: var(--sun-shadow);
            width: 100%
        }

        .main-content {
            width: 100%;
            display: flex;
            flex-direction: column;
            gap: 15px;
        }
        .section-title {
            font-family: 'Open Runde', sans-serif;
            font-size: 24px;
            font-weight: 700;
        }
        .hero-card {
            background-color: var(--search-background);
            border-radius: 50px;
            corner-shape: superellipse(1.5);
            padding: 30px;
            min-height: 200px;
            display: flex;
            flex-direction: column;
            justify-content: flex-end;
            position: relative;
            overflow: hidden;
            cursor: pointer;
            color: white;
            box-shadow: var(--sun-shadow);
            border: 1px solid var(--glass-border);
        }
        .hero-card img {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%; object-fit: cover; z-index: 0; filter: brightness(0.7);
        }
        .hero-card .content-z {
            position: relative; z-index: 1; display: flex; flex-direction: column; gap: 5px;
        }
        .hero-tag { font-size: 14px; text-transform: uppercase; letter-spacing: 1px; font-weight: 600; color: rgba(255,255,255,0.8); }
        .hero-title { font-size: 32px; font-family: 'Open Runde'; font-weight: 700; }
        .hero-subtitle { font-size: 16px; color: rgba(255,255,255,0.9); }

        .horizontal-scroll {
            display: flex; gap: 15px; overflow-x: auto; scroll-snap-type: x mandatory; margin-bottom: 20px; border-radius: 50px; corner-shape: superellipse(1.5);
        }
        .horizontal-scroll::-webkit-scrollbar { display: none; }
        .featured-small-card {
            width: 100%;
            min-width: 250px;
            background: var(--search-background);
            border-radius: 35px; corner-shape: superellipse(1.5);
            padding: 10px 12px;
            display: flex; flex-direction: column; gap: 10px;
            scroll-snap-align: start; cursor: pointer;
            border: 1px solid var(--glass-border);
            box-shadow: var(--sun-shadow);
        }
        .category-filter {
            overflow-x: auto;
            display: flex;
            gap: 5px;
            justify-content: center;
        }
        .category-filter::-webkit-scrollbar { display: none; }
        .category-btn {
            background-color: var(--search-background);
            color: var(--text-color);
            border: 1px solid var(--glass-border);
            border-radius: 10px;
            padding: 8px 15px;
            cursor: pointer;
            transition: all 0.2s ease;
            box-shadow: var(--sun-shadow);
        }
        .category-btn.active {
            background-color: var(--accent);
            color: var(--background-color);
            border-radius: 25px !important;
        }

        .search-container {
            position: relative;
            flex-grow: 1;
            min-width: 200px;
            margin-bottom: 10px;
        }

        .search-icon {
            position: absolute;
            left: 12px;
            top: 50%;
            transform: translateY(-50%);
            color: var(--secondary-text-color);
            pointer-events: none;
            z-index: 1;
        }

        .material-symbols-rounded.search-icon {
            font-size: 20px;
        }

        .library-search-input {
            width: 100%;
            border-radius: 25px;
            border: 1px solid var(--glass-border);
            background: var(--search-background);
            color: var(--text-color);
            outline: none;
            font-size: 16px;
            font-family: 'Inter', sans-serif;
            transition: all 0.3s ease;
            backdrop-filter: var(--edge-refraction-filter) saturate(2) blur(2.5px);
            box-shadow: var(--sun-shadow), 0 0 15px rgba(0, 0, 0, 0.05);
            padding: 12px 17px 12px 42px;"
        }

        @media (max-width: 480px) {
            .app-grid {
                grid-template-columns: 1fr;
            }
        }
    </style>
</head>
<body data-app-name="KIRBSTORE">
    <div class="content">
        <div class="toolbar">
            <button class="tab-btn active" data-tab="home">
                <span class="material-symbols-rounded">home</span>
                Home
            </button>
            <button class="tab-btn" data-tab="today">
                <span class="material-symbols-rounded">today</span>
                Today
            </button>
            <button class="tab-btn" data-tab="apps">
                <span class="material-symbols-rounded">newsstand</span>
                Library
            </button>
            <button class="tab-btn" data-tab="you">
                <span class="material-symbols-rounded">account_circle</span>
                You
            </button>
            <button class="tab-btn" data-tab="search">
                <span class="material-symbols-rounded">search</span>
                Search
            </button>
        </div>

        <div id="mainContent" class="main-content">
            <!-- Apps will be dynamically added here -->
        </div>
    </div>

    <!-- Add Store Modal -->
    <div class="create-modal" id="addStoreModal">
        <div class="modal-content">
            <div class="modal-header">
                <h2 class="modal-title">Add External Repository</h2>
            </div>
            <div style="margin-bottom: 20px;">Using an unverified external Store is at your own risk. It is recommended to only use kirbIndustries <a href="https://kirbindustries.gitbook.io/polygol/gurapps/verified-external-app-stores" target="_blank">verified stores</a>.</div>
            <div class="form-group">
                <label class="form-label">Store URL</label>
                <input type="url" class="form-input" id="storeUrlInput" placeholder="Add a valid Polygol Store inventory URL" required>
            </div>
            <button class="submit-btn" id="submitStore">Add Store</button>
        </div>
    </div>

    <script>
        const mainContent = document.getElementById('mainContent');
        const tabs = document.querySelectorAll('.tab-btn[data-tab]');
        const addStoreModal = document.getElementById('addStoreModal');
        const submitStore = document.getElementById('submitStore');
        const storeUrlInput = document.getElementById('storeUrlInput');
    
        let appStoreInventory =[];
        let installedAppsInfo = {};
        let currentCategory = 'All';
        let currentTab = 'home';
        let recommendations = { homeFeatured: [], editorsPicks: [], stories:[] };
    
        let storeSources = JSON.parse(localStorage.getItem('appStoreSources')) || [
            "https://polygol.github.io/inventories/default/inventory.json",
            "https://polygol.github.io/glucose-gurapps/inventory.json"
        ];

        function shuffleArray(array) {
            for (let i = array.length - 1; i > 0; i--) {
                const j = Math.floor(Math.random() * (i + 1));
                [array[i], array[j]] = [array[j], array[i]];
            }
        }

        // Modal functionality
        addStoreModal.addEventListener('click', (e) => {
            if (e.target === addStoreModal) {
                addStoreModal.classList.remove('show');
            }
        });

        submitStore.addEventListener('click', () => {
            const newUrl = storeUrlInput.value.trim();
            if (newUrl && !storeSources.includes(newUrl)) {
                storeSources.push(newUrl);
                saveStoreSources();
                loadAllInventories();
                storeUrlInput.value = '';
                addStoreModal.classList.remove('show');
                if (window.Gurasuraisu) {
                    Gurasuraisu.showPopup('Store added successfully');
                }
            }
        });

        // Handle enter key in modal
        storeUrlInput.addEventListener('keypress', (e) => {
            if (e.key === 'Enter') {
                submitStore.click();
            }
        });
    
        async function fetchInventory(url) {
            try {
                const response = await fetch(url);
                if (!response.ok) {
                    throw new Error(`HTTP error! status: ${response.status}`);
                }
                const data = await response.json();
                console.log(`Successfully fetched inventory from ${url}`, data);
                return data;
            } catch (error) {
                console.error(`Failed to fetch or parse inventory from ${url}:`, error);
                if (window.Gurasuraisu) {
                    Gurasuraisu.showPopup(`Error loading store: ${url}`);
                }
                return [];
            }
        }
    
        function stringToColor(str) {
            let hash = 0;
            for (let i = 0; i < str.length; i++) {
                hash = str.charCodeAt(i) + ((hash << 5) - hash);
            }
            const h = Math.abs(hash) % 360;
            return `hsl(${h}, 70%, 40%)`;
        }

        async function loadRecommendations() {
            try {
                const res = await fetch('https://raw.githubusercontent.com/kirbIndustries/assets/refs/heads/main/kirbstore/polygol/recommend.json');
                if (res.ok) {
                    const data = await res.json();
                    if (data.schedules) {
                        const now = new Date();
                        let activeRecs = data.default || { homeFeatured: [], editorsPicks: [], stories:[] };
                        
                        for (const schedule of data.schedules) {
                            if (new Date(schedule.startDate) <= now && new Date(schedule.endDate) >= now) {
                                activeRecs = schedule.recommendations;
                                break;
                            }
                        }
                        recommendations = activeRecs;
                    } else {
                        // Fallback for legacy format without schedules
                        recommendations = data;
                    }
                }
            } catch (e) {
                console.warn("Could not load recommendations", e);
            }
            
            // Fallback if missing core arrays
            if (!recommendations.editorsPicks || recommendations.editorsPicks.length === 0) {
                recommendations.editorsPicks = appStoreInventory.slice(0, 4).map(a => a.id);
                recommendations.homeFeatured = appStoreInventory.slice(4, 7).map(a => ({
                    appId: a.id,
                    tagline: "Featured App",
                    color: stringToColor(a.name)
                }));
                recommendations.stories =[
                    { title: "Essential Tools", subtitle: "Boost productivity", apps: appStoreInventory.filter(a => a.category === "Tools").slice(0, 3).map(a=>a.id), color: "#3498db" }
                ];
            }
        }
        
        async function loadAllInventories() {
            mainContent.innerHTML = `<div class="loading-message"><svg class="loading-spinner" viewBox="0 0 100 100" xmlns="http://www.w3.org/2000/svg"><rect width="100%" height="100%" fill="currentColor" stroke="none" class="loading-spinner-ind" /></svg></div>`;
            const allFetchPromises = storeSources.map(url => fetchInventory(url));
            const allInventories = await Promise.all(allFetchPromises);
            const rawInventory = allInventories.flatMap(inventory => (inventory && inventory.apps) ? inventory.apps : []);
    
            const today = new Date().toISOString().split('T')[0];
            const storageKey = `shuffledAppOrder_${today}`;
            const savedOrderJSON = localStorage.getItem(storageKey);
    
            if (savedOrderJSON) {
                const savedOrder = JSON.parse(savedOrderJSON);
                const appMap = new Map(rawInventory.map(app => [app.id, app]));
                appStoreInventory = savedOrder.map(id => appMap.get(id)).filter(Boolean);
                
                const presentIds = new Set(savedOrder);
                rawInventory.forEach(app => {
                    if (!presentIds.has(app.id)) {
                        appStoreInventory.push(app);
                    }
                });
            } else {
                appStoreInventory = rawInventory;
                shuffleArray(appStoreInventory);
                const newOrder = appStoreInventory.map(app => app.id);
                localStorage.setItem(storageKey, JSON.stringify(newOrder));
    
                Object.keys(localStorage).forEach(key => {
                    if (key.startsWith('shuffledAppOrder_') && key !== storageKey) {
                        localStorage.removeItem(key);
                    }
                });
            }
            
            await loadRecommendations();
            renderView();
        }
        
        function saveStoreSources() {
            localStorage.setItem('appStoreSources', JSON.stringify(storeSources));
        }
    
        function createAppCard(app) {
            const icon = app.iconUrl || '/assets/appicon/default.png'; 
        
            return `
                <div class="app-card" data-app-id="${app.id}">
                    <div class="app-header">
                        <img src="${icon}" alt="${app.name}" class="app-icon" crossorigin="anonymous" referrerpolicy="no-referrer">
                        <div class="app-info">
                            <div class="app-name">${app.name}</div>
                            <div class="app-developer">${app.developer || 'Unknown Developer'}</div>
                        </div>
                    </div>
                </div>
            `;
        }
    
        function renderView() {
            mainContent.innerHTML = '';
            
            if (currentTab === 'home') renderHome(mainContent);
            else if (currentTab === 'today') renderToday(mainContent);
            else if (currentTab === 'apps') renderApps(mainContent);
            else if (currentTab === 'search') renderSearch(mainContent);
            else if (currentTab === 'you') renderYou(mainContent);
        }

        function renderHome(container) {
            let html = '';
            if (recommendations.homeFeatured.length > 0) {
                html += `<div class="horizontal-scroll">`;
                recommendations.homeFeatured.forEach(feat => {
                    const app = appStoreInventory.find(a => a.id === feat.appId);
                    if (!app) return;
                    const color = feat.color || stringToColor(app.name);
                    html += `
                        <div class="hero-card app-card-clickable" data-app-id="${app.id}" style="background-color: ${color}; min-width: 40%; flex-shrink: 0;">
                            ${feat.banner ? `<img src="${feat.banner}" />` : ''}
                            <div class="content-z">
                                <div class="hero-tag">${feat.tagline || 'Featured'}</div>
                                <div class="hero-title">${app.name}</div>
                                <div class="hero-subtitle">${app.developer}</div>
                            </div>
                        </div>
                    `;
                });
                html += `</div>`;
            }

            if (recommendations.editorsPicks.length > 0) {
                html += `
                    <div class="section-title">Editors' Picks</div>
                    <div class="app-grid">
                        ${recommendations.editorsPicks.map(id => {
                            const app = appStoreInventory.find(a => a.id === id);
                            return app ? createAppCard(app) : '';
                        }).join('')}
                    </div>
                `;
            }
            container.innerHTML = html;
        }
        
        function renderToday(container) {
            // Get today's date
            const today = new Date();
            
            // Array of month names
            const monthNames = [
                "January", "February", "March", "April", "May", "June", "July", "August", "September", "October", "November", "December"
            ];

            // Array of weekday names
            const weekDayNames = [
                "Sunday", "Monday", "Tuesday", "Wednesday", "Thursday", "Friday", "Saturday"
            ];

            // Get the weekday name (e.g., "Tuesday")
            const weekday = weekDayNames[today.getDay()];

            // Get the day of the month (e.g., 16)
            const day = today.getDate();

            // Get the month name (e.g., "March")
            const month = monthNames[today.getMonth()];

            // Format the day with the "st", "nd", "rd", or "th" suffix
            const daySuffix = (day) => {
                if (day >= 11 && day <= 13) return "th"; // Special case for 11th-13th
                switch (day % 10) {
                    case 1: return "st";
                    case 2: return "nd";
                    case 3: return "rd";
                    default: return "th";
                }
            };

            // Combine everything into the desired format
            const formattedDate = `${weekday}, ${day}${daySuffix(day)} ${month}`;

            // Create the HTML content with the formatted date
            let html = `<div class="section-title">${formattedDate}</div><div style="display: flex; flex-direction: column; gap: 30px;">`;
            
            recommendations.stories.forEach(story => {
                html += `
                    <div>
                        <div class="hero-card" style="background-color: ${story.color || '#555'}; min-height: 250px; z-index: 2;">
                            <div class="content-z">
                                <div class="hero-tag">${story.subtitle}</div>
                                <div class="hero-title">${story.title}</div>
                            </div>
                        </div>
                        <div class="horizontal-scroll" style="border-radius: 35px; margin-bottom: 0; margin-top: 15px; z-index: 1;">
                            ${story.apps.map(id => {
                                const app = appStoreInventory.find(a => a.id === id);
                                if (!app) return '';
                                return `
                                    <div class="featured-small-card app-card-clickable" data-app-id="${app.id}">
                                        <div style="display: flex; align-items: center; gap: 15px;">
                                            <img src="${app.iconUrl}" style="width: 50px; height: 50px; border-radius: 35%; corner-shape: superellipse(1.25);">
                                            <div>
                                                <div style="font-weight: bold; font-family: 'Open Runde';">${app.name}</div>
                                                <div style="font-size: 13px; color: var(--secondary-text-color);">${app.developer}</div>
                                            </div>
                                        </div>
                                    </div>
                                `;
                            }).join('')}
                        </div>
                    </div>
                `;
            });
            html += '</div>';
            container.innerHTML = html;
        }

        function renderApps(container) {
            const categories =['All', ...new Set(appStoreInventory.map(a => a.category))].filter(Boolean);
            let html = `<div class="category-filter">`;
            categories.forEach(cat => {
                html += `<button class="category-btn ${currentCategory === cat ? 'active' : ''}" data-category="${cat}">${cat}</button>`;
            });
            html += `</div><div class="app-grid" id="appsViewGrid">`;
            
            let appsToRender = appStoreInventory;
            if (currentCategory !== 'All') appsToRender = appsToRender.filter(a => a.category === currentCategory);
            
            html += appsToRender.length > 0 ? appsToRender.map(a => createAppCard(a)).join('') : '<div class="no-apps-message">No apps found</div>';
            html += `</div>`;
            
            container.innerHTML = html;
            
            container.querySelectorAll('.category-btn').forEach(btn => {
                btn.addEventListener('click', (e) => {
                    currentCategory = e.target.dataset.category;
                    renderApps(container);
                });
            });
        }

        function renderSearch(container) {
            let html = `
                <div class="search-container" style="position: fixed; width: 90%; z-index: 1; left: 50%; transform: translateX(-50%);">
                    <span class="material-symbols-rounded search-icon" style="padding-left: 2px;">search</span>
                    <input type="text" id="searchInput" placeholder="Search apps, games, categories and more" class="library-search-input">
                </div>
                <div class="app-grid" id="searchGrid" style="padding-top: 60px;"></div>
            `;
            container.innerHTML = html;
            
            const input = container.querySelector('#searchInput');
            const grid = container.querySelector('#searchGrid');
            
            const updateSearch = () => {
                const term = input.value.toLowerCase();
                if (!term) {
                    grid.innerHTML = '';
                    return;
                }
                const filtered = appStoreInventory.filter(a => a.name.toLowerCase().includes(term) || (a.developer && a.developer.toLowerCase().includes(term)));
                grid.innerHTML = filtered.length > 0 ? filtered.map(a => createAppCard(a)).join('') : '<div class="no-apps-message">No results found</div>';
            };
            
            input.addEventListener('input', updateSearch);
            updateSearch();
        }

        function renderYou(container) {
            let html = `
                <div class="section-title" style="margin-top: 30px;">Installed Apps</div>
                <div class="app-grid">
            `;
            
            const installedApps = appStoreInventory.filter(a => installedAppsInfo[a.name]);
            html += installedApps.length > 0 ? installedApps.map(a => createAppCard(a)).join('') : `<div class="no-apps-message" style="grid-column: 1/-1;">No apps installed yet.</div>`;
            html += `</div>`;
            container.innerHTML = html;
            
            container.querySelector('#youAddStoreBtn').addEventListener('click', () => {
                addStoreModal.classList.add('show');
            });
        }

        function showAppDetails(app) {
            const installedVersion = installedAppsInfo[app.name];
            const isInstalled = !!installedVersion;

            // Check for updates by comparing file lists (more reliable than version numbers)
            const hasUpdate = isInstalled && 
                              app.filesToCache && 
                              installedVersion.filesToCache &&
                              app.filesToCache.sort().toString() !== installedVersion.filesToCache.sort().toString();

            let buttonHtml = '';
            
            const send = (data) => {
                const msg = { action: 'callGurasuraisuFunc', functionName: 'sheetMessageToApp', args: [data] };
                return `window.parent.postMessage(${JSON.stringify(msg).replace(/"/g, '&quot;')}, '*')`;
            };

            if (isInstalled) {
                if (hasUpdate) {
                    buttonHtml = `<button class="action-btn update-btn" onclick="${send({action: 'update', id: app.id})}">Update</button>`;
                }
                buttonHtml = `<button class="action-btn uninstall-btn" onclick="${send({action: 'uninstall', name: app.name})}">Uninstall</button>`;
            } else {
                buttonHtml = `<button class="action-btn install-btn" onclick="${send({action: 'install', id: app.id})}">Install</button>`;
            }

            const screenshotsHtml = (app.screenshots || []).map(s => `<img src="${s}" class="screenshot">`).join('');
            const descHtml = app.description || 'No description available';
            const privacyHtml = app.privacy || 'This app may collect personal and/or analytical data.';

            const sheetHtml = `
                <!DOCTYPE html>
                <html>
                    <head>
                        <style>
                            body {
                                margin: 0;
                                padding: 0 20px;
                                font-family: 'Inter', sans-serif;
                                color: var(--text-color);
                            }
                            .header {
                                display: flex;
                                gap: 20px;
                                align-items: center;
                                margin-bottom: 30px;
                            }
                            .icon {
                                width: 100px;
                                height: 100px;
                                border-radius: 35%;
                                corner-shape: superellipse(1.25);
                            }
                            .info {
                                display: flex;
                                flex-direction: column;
                                gap: 8px;
                                flex: 1;
                            }
                            .name {
                                font-size: 1.5rem;
                                font-family: 'Open Runde';
                                font-weight: bold;
                            }
                            .dev {
                                color: var(--secondary-text-color);
                                font-size: 1rem;
                            }
                            .action-btn {
                                padding: 10px 18px;
                                border-radius: 25px;
                                border: none;
                                font-weight: 500;
                                cursor: pointer;
                                background: var(--accent);
                                color: var(--background-color);
                                border: 1px solid var(--glass-border);
                                box-shadow: var(--sun-shadow);
                                font-family: 'Inter';
                            }
                            .uninstall-btn {
                                background: var(--search-background);
                                color: var(--text-color);
                            }
                            .screenshots {
                                display: flex;
                                gap: 15px;
                                overflow-x: auto;
                                padding-bottom: 15px;
                                margin-bottom: 25px;
                                scroll-snap-type: x mandatory;
                                border-radius: 50px;
                                corner-shape: superellipse(1.5);
                            }
                            .screenshots::-webkit-scrollbar {
                                display: none;
                            }
                            .screenshot {
                                height: 350px;
                                border-radius: inherit;
                                corner-shape: inherit;
                                object-fit: contain;
                                scroll-snap-align: center;
                                background: rgba(0, 0, 0, 0.2);
                            }
                            .section {
                                margin-bottom: 10px;
                                background: var(--search-background);
                                border: 1px solid var(--glass-border);
                                box-shadow: var(--sun-shadow);
                                padding: 16px 20px;
                                border-radius: 35px;
                                corner-shape: superellipse(1.5);
                            }
                            .section h3 {
                                font-family: 'Open Runde';
                                margin-top: 0;
                                margin-bottom: 10px;
                                font-size: 0.9rem;
                            }
                            .section p {
                                color: var(--secondary-text-color, #ccc);
                                margin: 0;
                                font-size: 0.9rem;
                            }
                            .desc {
                                font-size: 1rem;
                                padding: 0 10px;
                            }
                            .actions-row {
                                display: flex;
                                gap: 10px;
                                margin-top: 5px;
                            }
                        </style>
                    </head>
                    <body>
                        <div class="header">
                            <img src="${app.iconUrl}" class="icon">
                            <div class="info">
                                <div class="name">${app.name}</div>
                                <div class="dev">${app.developer}</div>
                                <div class="actions-row">${buttonHtml}</div>
                            </div>
                        </div>
                        ${app.screenshots && app.screenshots.length > 0 ? `
                        <div class="screenshots">
                            ${screenshotsHtml}
                        </div>` : ''}
                        <p class="desc">${descHtml}</p>
                        <div class="section">
                            <h3>Privacy & Data</h3>
                            <p>${privacyHtml}</p>
                        </div>
                    </body>
                </html>
            `;

            Gurasuraisu.showSheet({
                html: sheetHtml,
                height: '85%'
            });
        }
        
        function setupSheetListener() {
            Gurasuraisu.sheet.onMessage((msg) => {
                if (msg.action === 'install' || msg.action === 'update') {
                    const app = appStoreInventory.find(a => a.id === msg.id);
                    if (app) {
                        Gurasuraisu.installApp(app);
                        installedAppsInfo[app.name] = { filesToCache: app.filesToCache };
                        renderView();
                        Gurasuraisu.closeSheet();
                    }
                } else if (msg.action === 'uninstall') {
                    Gurasuraisu.deleteApp(msg.name);
                    delete installedAppsInfo[msg.name];
                    renderView();
                    Gurasuraisu.closeSheet();
                }
            });
        }

        window.addEventListener('message', (event) => {
            if (event.origin !== window.location.origin) return;
            if (event.data.type === 'installed-apps-list') {
                installedAppsInfo = event.data.apps || {}; 
                renderView();
            }
        });
        
        mainContent.addEventListener('click', (e) => {
            const card = e.target.closest('.app-card, .app-card-clickable');
            
            if (card) {
                const appId = card.dataset.appId;
                if (appId) {
                    const app = appStoreInventory.find(a => a.id === appId);
                    if (app) showAppDetails(app);
                }
            }
        });
    
        tabs.forEach(btn => {
            btn.addEventListener('click', () => {
                tabs.forEach(b => b.classList.remove('active'));
                btn.classList.add('active');
                currentTab = btn.dataset.tab;
                renderView();
            });
        });
    
        function onApiReady() {
            // Register all widgets the app provides as soon as the API is ready.
            Gurasuraisu.registerWidget({
                appName: 'kirbStore',
                widgetId: 'kirbstore-random-app',
                title: 'Random App',
                url: '/kirbstore/widgets/widget-random-app.html',
                defaultSize: [1, 1],
                openUrl: '/kirbstore/index.html' // Tapping the widget opens the main app
            });

            setupSheetListener();
            Gurasuraisu.requestInstalledApps();
            loadAllInventories();
        }

        // Check if the API script has already loaded and fired its event
        if (window.Gurasuraisu) {
            onApiReady();
        } else {
            // Otherwise, wait for the custom event from gurasuraisu-api.js
            window.addEventListener('GurasuraisuReady', onApiReady);
        }
    </script>
</body>
</html>
